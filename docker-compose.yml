version: '3.8'

services:
  backend:
    build: .
    container_name: gisul-backend
    ports:
      - "5000:5000"
    environment:
      - SQLALCHEMY_DATABASE_URL=sqlite:///./gisul.db
      - SECRET_KEY=dev-secret-key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - PORT=5000
    volumes:
      - ./backend-fastapi:/app
    command: python main.py
    networks:
      - gisul-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: gisul-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - gisul-network

networks:
  gisul-network:
    driver: bridge
